    <path d="M 440 180 Q 320 90 178 158"
          stroke="url(#connOut)" stroke-width="1.8" stroke-dasharray="4 5" opacity="0.95">
      <animate attributeName="stroke-dashoffset" from="36" to="0" dur="6s" repeatCount="indefinite"/>
